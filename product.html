<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Inquiry - MNM Thriftshop</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="product.css">
</head>
<body>

<header>
  <div class="header-top">
    <a href="index.html" class="logo">MNM<span>.</span></a>
    <nav>
      <a href="index.html#featured">Featured</a>
      <a href="index.html#products">Archive</a>
      <a href="index.html#contact">Contact</a>
    </nav>
    <div class="header-actions">
      <a href="index.html#search" style="color: var(--gray);">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
      </a>
    </div>
  </div>
</header>

<main>
  <a href="index.html" class="back-link">

    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
    Back to Archive
  </a>

  <div class="product-container" id="product-page-content">
    <div class="product-visual reveal" id="gallery-root">
       <div id="image-placeholder" style="width:100%; aspect-ratio:3/4; background:#111; animation:pulse 2s infinite;"></div>
       <button class="gallery-arrow arrow-left" onclick="scrollGallery(-1)" id="prev-arrow" style="display:none;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"></polyline></svg>
       </button>
       <div id="gallery-images"></div>
       <button class="gallery-arrow arrow-right" onclick="scrollGallery(1)" id="next-arrow" style="display:none;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"></polyline></svg>
       </button>
       <div id="image-counter" class="gallery-counter" style="display:none;">1 / 1</div>
    </div>
    
    <div class="product-details reveal">
      <div id="brand-name" class="item-brand">Loading...</div>
      <h1 id="product-name" class="item-name">----</h1>
      <div id="product-price" class="item-price">----</div>
      <div id="product-views" style="font-size: 0.6rem; color: #666; margin-top: 0.5rem; text-transform: uppercase; letter-spacing: 0.1em; display: flex; align-items: center; gap: 4px;"></div>

      
      <div class="inquiry-form">
        <div class="form-title">Submit Purchase Inquiry</div>
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="cust-name" placeholder="Enter your name">
        </div>
        <div class="form-group">
          <label>Desired Size</label>
          <select id="cust-size">
            <option value="Standard">Standard (As listed)</option>
            <option value="Small">Small</option>
            <option value="Medium">Medium</option>
            <option value="Large">Large</option>
            <option value="XL">XL</option>
          </select>
        </div>
        <div class="form-group">
          <label>Delivery Address / Location</label>
          <input type="text" id="cust-location" placeholder="City, Country">
        </div>
        <div class="form-group">
          <label>Phone Number</label>
          <input type="text" id="cust-phone" placeholder="+00 000 000 000">
        </div>

        <div class="action-buttons">
          <button onclick="sendViaInstagram()" class="btn btn-primary">Inquiry via Instagram DM</button>
          <button onclick="sendViaEmail()" class="btn btn-secondary">Inquiry via Direct Email</button>
        </div>
        <p style="font-size: 0.7rem; color: #555; margin-top: 1rem; text-align: center;">* Clicking IG will copy info to clipboard so you can paste it in DMs.</p>
      </div>
    </div>
  </div>
</main>

<div id="copy-toast">Inquiry details copied!</div>

<footer>
  <p>&copy; 2026 MNM THRIFTSHOP. ALL RIGHTS RESERVED.</p>
</footer>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script src="product-script.js"></script>

</body>
</html>

</body>
</html>
